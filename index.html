<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VisionMatch AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --blue:#2563EB; --blue-dark:#1D4ED8; --blue-light:#EFF6FF; --blue-mid:#BFDBFE;
    --surface:#F8FAFF; --card-bg:#FFFFFF; --border:#E2E8F0;
    --text-main:#0F172A; --text-sub:#475569; --text-hint:#94A3B8;
    --radius-sm:8px; --radius-md:16px; --radius-lg:24px;
  }
  body {
    font-family:'Inter',Arial,sans-serif;
    background:linear-gradient(135deg,#EFF6FF 0%,#F0F4FF 50%,#FAF5FF 100%);
    min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;
  }
  .shell {
    width:100%; max-width:680px; height:82vh; max-height:760px;
    background:var(--card-bg); border-radius:var(--radius-lg);
    border:1px solid var(--border); overflow:hidden;
    display:flex; flex-direction:column;
    box-shadow:0 0 0 1px rgba(37,99,235,0.06),0 20px 60px rgba(15,23,42,0.10),0 4px 16px rgba(15,23,42,0.06);
  }
  .header {
    display:flex; align-items:center; gap:12px; padding:18px 22px;
    background:var(--card-bg); border-bottom:1px solid var(--border); flex-shrink:0;
  }
  .header-avatar {
    width:38px; height:38px; border-radius:12px; background:var(--blue);
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .header-avatar svg { width:20px; height:20px; fill:#fff; }
  .header-info { flex:1; }
  .header-info h1 { font-size:15px; font-weight:600; color:var(--text-main); letter-spacing:-0.2px; }
  .header-info p { font-size:12px; color:#22C55E; font-weight:500; margin-top:1px; display:flex; align-items:center; gap:4px; }
  .header-info p::before { content:''; width:6px; height:6px; border-radius:50%; background:#22C55E; }
  .header-badge {
    font-size:11px; font-weight:600; background:var(--blue-light); color:var(--blue);
    padding:4px 10px; border-radius:99px; border:1px solid var(--blue-mid);
  }
  .body {
    flex:1; overflow-y:auto; padding:20px 22px; background:var(--surface);
    scroll-behavior:smooth; display:flex; flex-direction:column; gap:6px;
  }
  .body::-webkit-scrollbar { width:4px; }
  .body::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }
  .row { display:flex; align-items:flex-end; gap:8px; }
  .row.user { flex-direction:row-reverse; }
  .row + .row { margin-top:4px; }
  .avatar-sm {
    width:28px; height:28px; border-radius:9px; background:var(--blue);
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .avatar-sm svg { width:14px; height:14px; fill:#fff; }
  .row.products-row { align-items:flex-start; }
  .row.products-row > .products-wrap { flex:1 1 auto; min-width:0; }
  .bubble { max-width:75%; padding:11px 15px; border-radius:var(--radius-md); font-size:14px; line-height:1.6; color:var(--text-main); }
  .bubble.bot { background:var(--card-bg); border:1px solid var(--border); border-bottom-left-radius:4px; }
  .bubble.user { background:var(--blue); color:#fff; border-bottom-right-radius:4px; font-weight:500; }
  .typing-bubble {
    background:var(--card-bg); border:1px solid var(--border); border-radius:var(--radius-md);
    border-bottom-left-radius:4px; padding:14px 18px; display:flex; gap:5px; align-items:center;
  }
  .dot { width:7px; height:7px; border-radius:50%; background:var(--text-hint); animation:pulse 1.4s infinite; }
  .dot:nth-child(2){animation-delay:.2s;} .dot:nth-child(3){animation-delay:.4s;}
  @keyframes pulse { 0%,60%,100%{opacity:.4;transform:scale(1);} 30%{opacity:1;transform:scale(1.25);} }
  .products-wrap { display:flex; flex-direction:column; gap:10px; margin-top:4px; width:100%; max-width:100%; min-width:0; }
  .tv-card {
    background:var(--card-bg); border:1px solid var(--border); border-radius:var(--radius-md);
    padding:14px; display:flex; gap:14px; align-items:flex-start; animation:fadeUp .3s ease both;
    width:100%; max-width:100%; min-width:0; overflow:hidden;
  }
  .tv-card:first-child { border-color:var(--blue-mid); border-width:1.5px; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:translateY(0);} }
  .tv-thumb, .tv-thumb-placeholder {
    width:72px; height:72px; border-radius:var(--radius-sm); background:var(--surface);
    border:1px solid var(--border); flex-shrink:0;
  }
  .tv-thumb { object-fit:contain; padding:4px; }
  .tv-thumb-placeholder { display:flex; align-items:center; justify-content:center; }
  .tv-thumb-placeholder svg { width:28px; height:28px; stroke:var(--text-hint); fill:none; }
  .tv-info { flex:1 1 auto; min-width:0; overflow:hidden; }
  .tv-badges { display:flex; gap:6px; margin-bottom:6px; flex-wrap:wrap; }
  .badge { font-size:10px; font-weight:600; padding:2px 8px; border-radius:99px; white-space:nowrap; }
  .badge-rank { background:var(--blue); color:#fff; }
  .badge-top { background:#FEF3C7; color:#92400E; border:1px solid #FDE68A; }
  .badge-fam { background:var(--blue-light); color:var(--blue); border:1px solid var(--blue-mid); }
  .tv-name { font-size:13px; font-weight:500; color:var(--text-main); line-height:1.35;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:4px; max-width:100%; }
  .tv-meta { font-size:12px; color:var(--text-sub); display:flex; gap:12px; flex-wrap:wrap; margin-bottom:8px; }
  .tv-meta span { display:flex; align-items:center; gap:3px; min-width:0; }
  .tv-meta svg { width:12px; height:12px; stroke:var(--text-hint); fill:none; flex-shrink:0; }
  .tv-footer { display:flex; align-items:center; justify-content:space-between; gap:8px; }
  .tv-price { font-size:17px; font-weight:600; color:var(--blue); letter-spacing:-0.4px; }
  .btn-ver { font-size:12px; font-weight:600; background:var(--blue); color:#fff;
    padding:6px 13px; border-radius:var(--radius-sm); text-decoration:none; white-space:nowrap; }
  .btn-ver:hover { background:var(--blue-dark); }
  .footer { padding:14px 18px; background:var(--card-bg); border-top:1px solid var(--border); flex-shrink:0; }
  .input-row {
    display:flex; align-items:center; gap:10px; background:var(--surface);
    border:1px solid var(--border); border-radius:var(--radius-md); padding:8px 10px 8px 16px;
    transition:border-color .15s,box-shadow .15s;
  }
  .input-row:focus-within { border-color:var(--blue); box-shadow:0 0 0 3px rgba(37,99,235,0.10); }
  .input-row input { flex:1; border:none; background:transparent; font-family:inherit; font-size:14px; color:var(--text-main); outline:none; }
  .input-row input::placeholder { color:var(--text-hint); }
  .input-row input:disabled { opacity:.5; }
  .send-btn {
    width:36px; height:36px; border-radius:10px; background:var(--blue); border:none; cursor:pointer;
    display:flex; align-items:center; justify-content:center; transition:background .15s,transform .1s; flex-shrink:0;
  }
  .send-btn:hover:not(:disabled){background:var(--blue-dark);}
  .send-btn:active:not(:disabled){transform:scale(.94);}
  .send-btn:disabled{background:var(--border);cursor:not-allowed;}
  .send-btn svg { width:16px; height:16px; fill:#fff; }
  .hint-text { font-size:11px; color:var(--text-hint); text-align:center; margin-top:8px; }
</style>
</head>
<body>
<div class="shell">
  <div class="header">
    <div class="header-avatar">
      <svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73L13 2.27a2 2 0 0 0-2 0L4 6.27A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
    </div>
    <div class="header-info">
      <h1>VisionMatch AI</h1>
      <p>En línea</p>
    </div>
    <div class="header-badge">IA · TV Expert</div>
  </div>
  <div class="body" id="chatBody"></div>
  <div class="footer">
    <div class="input-row">
      <input id="userInput" placeholder="Escribe tu mensaje…" autocomplete="off" />
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" aria-label="Enviar">
        <svg viewBox="0 0 24 24"><path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"/></svg>
      </button>
    </div>
    <p class="hint-text">Powered by Azure OpenAI · Databricks KMeans</p>
  </div>
</div>

<script>
const API_URL = "https://visionmatch-azf.azurewebsites.net/api/chat";

// Historial completo de la conversación (se envía al backend en cada turno)
const history = [];

const ICON_TV    = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><polyline points="8 21 12 17 16 21"/></svg>`;
const ICON_STORE = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>`;
const ICON_RULER = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="8" width="20" height="8" rx="1"/><path d="M6 8v3M10 8v4M14 8v4M18 8v3"/></svg>`;
const ICON_BOT   = `<svg viewBox="0 0 24 24" fill="#fff"><path d="M21 16V8a2 2 0 0 0-1-1.73L13 2.27a2 2 0 0 0-2 0L4 6.27A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>`;

function scrollBottom(){ const b=document.getElementById("chatBody"); setTimeout(()=>b.scrollTop=b.scrollHeight,40); }
function botAvatar(){ return `<div class="avatar-sm">${ICON_BOT}</div>`; }

function addBot(html){
  document.getElementById("chatBody").insertAdjacentHTML("beforeend",
    `<div class="row">${botAvatar()}<div class="bubble bot">${html}</div></div>`);
  scrollBottom();
}
function addUser(text){
  document.getElementById("chatBody").insertAdjacentHTML("beforeend",
    `<div class="row user"><div class="bubble user">${text}</div></div>`);
  scrollBottom();
}
function showTyping(){
  document.getElementById("chatBody").insertAdjacentHTML("beforeend",
    `<div class="row" id="typingRow">${botAvatar()}<div class="typing-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`);
  scrollBottom();
}
function removeTyping(){ const e=document.getElementById("typingRow"); if(e) e.remove(); }
function setLoading(on){ document.getElementById("sendBtn").disabled=on; document.getElementById("userInput").disabled=on; }

function renderProducts(products){
  const chat = document.getElementById("chatBody");

  // Fila contenedora con avatar + grilla de cards
  const row = document.createElement("div");
  row.className = "row products-row";
  row.insertAdjacentHTML("beforeend", botAvatar());

  const wrap = document.createElement("div");
  wrap.className = "products-wrap";

  products.forEach((p, i) => {
    const isTop = i === 0;
    const price = Number(p.precio).toLocaleString("es-PE", { maximumFractionDigits: 0 });

    const card = document.createElement("div");
    card.className = "tv-card";

    // --- Imagen (con fallback seguro vía addEventListener, no onerror inline) ---
    if (p.imagen) {
      const img = document.createElement("img");
      img.className = "tv-thumb";
      img.src = p.imagen;
      img.alt = p.name || "Televisor";
      img.addEventListener("error", () => {
        const ph = document.createElement("div");
        ph.className = "tv-thumb-placeholder";
        ph.innerHTML = ICON_TV;
        img.replaceWith(ph);
      });
      card.appendChild(img);
    } else {
      const ph = document.createElement("div");
      ph.className = "tv-thumb-placeholder";
      ph.innerHTML = ICON_TV;
      card.appendChild(ph);
    }

    // --- Info del producto ---
    const info = document.createElement("div");
    info.className = "tv-info";
    info.innerHTML = `
      <div class="tv-badges">
        <span class="badge badge-rank">#${p.rank || i + 1}</span>
        ${isTop ? '<span class="badge badge-top">Mejor opción</span>' : ''}
        <span class="badge badge-fam">${p.familia || ''}</span>
      </div>
      <div class="tv-name" title="${(p.name || '').replace(/"/g, '&quot;')}">${p.name || ''}</div>
      <div class="tv-meta">
        <span>${ICON_RULER} ${p.pulgadas}"</span>
        <span>${ICON_STORE} ${p.vendedor || ''}</span>
      </div>
      <div class="tv-footer">
        <span class="tv-price">S/ ${price}</span>
        <a class="btn-ver" href="${p.url || '#'}" target="_blank" rel="noopener">Ver producto →</a>
      </div>`;
    card.appendChild(info);
    wrap.appendChild(card);
  });

  row.appendChild(wrap);
  chat.appendChild(row);
  scrollBottom();
}

async function sendMessage(){
  const input = document.getElementById("userInput");
  const message = input.value.trim();
  if(!message) return;

  addUser(message);
  history.push({ role:"user", content:message });
  input.value = "";

  setLoading(true);
  showTyping();

  try {
    const resp = await fetch(API_URL, {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ history }),
    });
    if(!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    removeTyping();

    if(data.message){
      addBot(data.message.replace(/\n/g,"<br>"));
      // Guardar la respuesta del asistente en el historial
      history.push({ role:"assistant", content:data.message });
    }
    if(data.products && data.products.length>0){
      renderProducts(data.products);
    }
  } catch(err){
    removeTyping();
    addBot("Hubo un problema al conectar con el servidor. Intenta nuevamente en unos segundos.");
    console.error(err);
  } finally {
    setLoading(false);
    document.getElementById("userInput").focus();
  }
}

document.getElementById("userInput").addEventListener("keypress", e=>{ if(e.key==="Enter") sendMessage(); });

// Saludo inicial — viene del backend para que sea natural
window.addEventListener("DOMContentLoaded", async ()=>{
  showTyping();
  try {
    const resp = await fetch(API_URL, {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ history: [{ role:"user", content:"Hola" }] }),
    });
    const data = await resp.json();
    removeTyping();
    if(data.message){
      addBot(data.message.replace(/\n/g,"<br>"));
      history.push({ role:"user", content:"Hola" });
      history.push({ role:"assistant", content:data.message });
    }
  } catch(err){
    removeTyping();
    addBot("Hola 👋 soy <strong>VisionMatch AI</strong>. ¿En qué televisor estás pensando hoy?");
  }
});
</script>
</body>
</html>
